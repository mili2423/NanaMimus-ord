<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Nana Mimus</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor_registro" id="bloque_perfil" style="display: none;">
        
        <div style="text-align: left; padding: 10px 0 0 10px;">
            <a href="indexNanaMimus.php" style="text-decoration: none; font-size: 24px; color: #ffb6c1; font-weight: bold;">←</a>
        </div>

        <div class="encabezado" style="margin-top: -10px;">
            <img src="NanaMimus/logotipo.jpg" alt="Logo Nana Mimus" class="logo-redondo-tienda">
            <h2 class="Titulo_1">Tu información de usuario</h2>
            <p class="Subtitulo" style="color: #ffb6c1; font-weight: bold; font-size: 1.2rem;">Perfil</p>
        </div>

        <div class="cuerpo_formulario">
            <form action="perfil.php" method="POST" id="formulario_perfil">
                
                <div class="grupo_input">
                    <label for="nombre">Nombre</label>
                    <input type="text" name="Nombre" id="nombre" class="input-estilo" required disabled>
                </div>
               
                <div class="grupo_input">
                    <label for="apellido">Apellido</label>
                    <input type="text" name="Apellido" id="apellido" class="input-estilo" required disabled>
                </div>

                <div class="grupo_input">
                    <label for="fecha_nac">Fecha de nacimiento</label>
                    <input type="date" name="FechaNac" id="fecha_nac" class="input-estilo" required disabled>
                </div>

                <div class="grupo_input">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" class="input-estilo" readonly style="background-color: #f5f5f5; cursor: not-allowed;">
                </div>

                <div class="grupo_input">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" name="Telefono" id="telefono" class="input-estilo" disabled>
                </div>

                <div class="grupo_input">
                    <label for="contra">Contraseña</label>
                    <input type="password" name="Contra" placeholder="Dejar en blanco para mantener la actual" id="contra" class="input-estilo" disabled>
                </div>

                <button type="button" id="btn_accion" class="btn-principal" style="margin-top: 20px;">
                    Editar Perfil
                </button>

                <div class="divisor" style="margin: 20px 0 10px 0;">
                    <span>¿Quieres salir?</span>
                </div>

                <a href="logout.php" class="btn-secundario" style="text-align: center; display: block; text-decoration: none; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">
                    Cerrar Sesión
                </a>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnAccion = document.getElementById("btn_accion");
            const formulario = document.getElementById("formulario_perfil");
            
            // 1. VALIDACIÓN: Preguntar a PHP si el usuario inició sesión y traer los datos
            fetch("perfil.php?cargar_datos=true")
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        // Si no está logueado, redirige de inmediato
                        window.location.href = "inicio_sesion.html";
                    } else {
                        // Rellenar campos y mostrar el contenedor
                        document.getElementById("nombre").value = data.nombre || '';
                        document.getElementById("apellido").value = data.apellido || '';
                        document.getElementById("fecha_nac").value = data.fecha || '';
                        document.getElementById("email").value = data.email || '';
                        document.getElementById("telefono").value = data.telefono || '';
                        document.getElementById("bloque_perfil").style.display = "block";
                    }
                })
                .catch(err => {
                    console.error("Error:", err);
                    window.location.href = "inicio_sesion.html";
                });

            // 2. LÓGICA DEL BOTÓN EDITAR / GUARDAR
            btnAccion.addEventListener("click", () => {
                if (btnAccion.type === "button") {
                    // El usuario quiere EDITAR: Habilitamos los campos bloqueados
                    document.getElementById("nombre").disabled = false;
                    document.getElementById("apellido").disabled = false;
                    document.getElementById("fecha_nac").disabled = false;
                    document.getElementById("telefono").disabled = false;
                    document.getElementById("contra").disabled = false;

                    // Cambiamos el comportamiento y el texto del botón
                    btnAccion.type = "submit";
                    btnAccion.innerHTML = "Guardar Cambios <span>➔</span>";
                    btnAccion.style.backgroundColor = "#28a745"; // Opcional: cambia a verde al guardar
                }
            });
        });
    </script>

</body>
</html>
