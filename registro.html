<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Nana Mimus</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor_registro">
        <div class="encabezado">
            <a href="indexNanaMimus.php">
                <img src="NanaMimus/logotipo.jpg" alt="Logo Nana Mimus" class="logo-redondo-tienda">
            </a>
            <h2 class="Titulo_1">Crear una cuenta</h2>
            <p class="Subtitulo">Únete a la comunidad de Nana Mimus</p>
        </div>

        <div class="cuerpo_formulario">
           <form action="registrar.php" method="POST">
                
                <div class="fila-doble">
                    <div class="grupo_input">
                        <label for="nombre">Nombre</label>
                        <input type="text" name="Nombre" placeholder="Tu nombre" id="nombre" class="input-estilo" required>
                    </div>
                    <div class="grupo_input">
                        <label for="apellido">Apellido</label>
                        <input type="text" name="Apellido" placeholder="Tu apellido" id="apellido" class="input-estilo" required>
                    </div>
                </div>

                <div class="grupo_input">
                    <label for="fecha_nac">Fecha de nacimiento</label>
                    <input type="date" name="FechaNac" id="fecha_nac" class="input-estilo" required>
                </div>

                <div class="grupo_input">
                    <label for="email">Correo electrónico</label>
                    <input type="email" name="Email" placeholder="tucorreo@ejemplo.com" id="email" class="input-estilo" required>
                </div>

                <div class="grupo_input">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" name="Telefono" placeholder="Ej: +54 9 11 ..." id="telefono" class="input-estilo">
                </div>

                <div class="grupo_input">
                    <label for="contra">Contraseña</label>
                    <input type="password" name="Contra" placeholder="Crea una contraseña" id="contra" class="input-estilo" required>
                </div>

                <div class="grupo_input">
                    <label for="confirmar_contra">Confirmar Contraseña</label>
                    <input type="password" name="ConfirmarContra" placeholder="Repite tu contraseña" id="confirmar_contra" class="input-estilo" required>
                </div>

                <button type="submit" class="btn-principal">
                    Registrarse <span>➔</span>
                </button>

                <div class="divisor">
                    <span>¿Ya tienes una cuenta?</span>
                </div>

                <a href="inicio_sesion.html" class="btn-secundario">
                    Regresar al inicio de sesión
                </a>
            </form>
        </div>
    </div>

</body>
</html>
